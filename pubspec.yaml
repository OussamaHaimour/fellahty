name: fellahty
description: Fellahty - Connect farmers with seasonal agricultural workers and equipment rentals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.0.0

  intl: ^0.19.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  googleapis_auth: ^2.0.0
  http: ^1.6.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
